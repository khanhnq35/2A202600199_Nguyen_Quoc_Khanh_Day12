# ============================================================
# render.yaml — Infrastructure as Code cho Render
#
# Docs: https://render.com/docs/blueprint-spec
# Commit file này vào git → Render tự sync infrastructure.
# ============================================================

services:
  # ──────────────────────────────────────
  # Web Service — AI Agent
  # ──────────────────────────────────────
  - type: web
    name: ai-agent-khanh
    runtime: docker
    region: singapore
    plan: free
    rootDir: 06-lab-complete
    healthCheckPath: /health

    healthCheckPath: /health   # Render check path này

    autoDeploy: true           # Auto deploy khi push to GitHub

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      # Secrets — set qua Render Dashboard (không commit giá trị thật)
      - key: AGENT_API_KEY
        generateValue: true    # Render tự sinh random value

    # Disk (nếu agent cần lưu file)
    # disk:
    #   name: agent-data
    #   mountPath: /data
    #   sizeGB: 1

  # ──────────────────────────────────────
  # Redis (dùng Render Redis add-on)
  # ──────────────────────────────────────
  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Cho phép các dịch vụ nội bộ kết nối

# ============================================================
# Cách deploy:
#   1. Push code lên GitHub
#   2. Render Dashboard → New → Blueprint
#   3. Connect repo → Render đọc render.yaml này
#   4. Review và Deploy
# ============================================================
