services:
  - type: web
    name: ai-agent-khanh
    runtime: docker
    region: singapore
    plan: free
    # Khi dùng file này để deploy Blueprint, rootDir nên là '.' vì nó nằm sẵn trong folder đó
    rootDir: .
    dockerContext: .
    dockerTarget: production
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
